<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Vektor Übung R³</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            margin: 15px;
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
        }

        #task-panel {
            margin-top: 50px;
        }

        .title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4da6ff;
            margin-bottom: 5px;
        }

        .task-text {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .hint {
            font-size: 0.9rem;
            color: #aaaaaa;
            margin-top: 5px;
        }

        #controls {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            pointer-events: auto;
        }

        button {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s, transform 0.1s;
            font-weight: bold;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        #btn-action.btn-green { background-color: #28a745; }
        #btn-action.btn-red { background-color: #dc3545; }

        .ar-only {
            display: none;
        }
        
        :xr-overlay {
            display: block;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background-color: rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
    
    <!-- Import Maps für Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui-container">
        <div id="task-panel" class="panel ar-only">
            <div class="title" id="task-title">Aktuelle Aufgabe</div>
            <div class="task-text" id="task-display">Wird geladen...</div>
            <div class="hint" id="status-hint">Bewege dich, um den Startpunkt P zu finden.</div>
        </div>

        <!-- Fadenkreuz für die Bildschirmmitte -->
        <div id="crosshair" class="ar-only"></div>

        <div id="controls" class="ar-only">
            <button id="btn-action">Startpunkt setzen</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        // --- Konstanten & Setup ---
        const UNIT_SCALE = 0.15; // 15 cm pro Einheit im echten Raum
        const GRID_SIZE = 4;     // -4 bis +4 in alle Richtungen

        let camera, scene, renderer;
        let coordSystem;
        let coordSystemPlaced = false;
        
        // Spielzustand
        let state = 'PLACE_SYSTEM'; // PLACE_SYSTEM, FIND_START, DRAWING, EVALUATION
        let targetP = new THREE.Vector3();
        let targetV = new THREE.Vector3();
        let userStart = new THREE.Vector3();
        let userEnd = new THREE.Vector3();

        // 3D Objekte für die Interaktion
        let cursorWorld; 
        let targetPointMesh; // Visueller Punkt für den Startpunkt P
        let snappedLocalPos = new THREE.Vector3(); 
        let isSnapped = false;
        
        let dynamicLine, dynamicArrow; 
        let correctLine, correctArrow; 

        // UI Elemente
        const taskTitle = document.getElementById('task-title');
        const taskDisplay = document.getElementById('task-display');
        const statusHint = document.getElementById('status-hint');
        const btnAction = document.getElementById('btn-action');

        init();
        animate();

        function init() {
            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Licht für die 3D Objekte
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            // Renderer Setup mit XR
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            const arOptions = {
                requiredFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ui-container') }
            };
            document.body.appendChild(ARButton.createButton(renderer, arOptions));

            // Wenn AR startet
            renderer.xr.addEventListener('sessionstart', () => {
                document.querySelectorAll('.ar-only').forEach(el => el.style.display = 'block');
                
                // Setze auf Platzierungsmodus zurück
                coordSystemPlaced = false; 
                state = 'PLACE_SYSTEM';
                
                taskTitle.textContent = "Schritt 1";
                taskDisplay.innerHTML = "System platzieren";
                statusHint.textContent = "Schau auf eine freie Fläche. Wenn das Koordinatensystem gut schwebt, drücke Platzieren.";
                
                btnAction.textContent = "Hier platzieren";
                btnAction.className = "";
                btnAction.disabled = false;

                coordSystem.visible = true; // Zeige es zur Platzierungsvorschau an
                cursorWorld.visible = false; // Cursor erst nach Platzierung zeigen
                targetPointMesh.visible = false;
            });

            renderer.xr.addEventListener('sessionend', () => {
                document.querySelectorAll('.ar-only').forEach(el => el.style.display = 'none');
            });

            buildCoordinateSystem();
            setupInteractionObjects();

            // Event Listener
            window.addEventListener('resize', onWindowResize);
            btnAction.addEventListener('click', handleActionClick);
        }

        function makeTextSprite(message, color) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 128;
            canvas.height = 128;
            
            context.font = "Bold 60px Arial";
            context.fillStyle = color;
            context.textAlign = "center";
            context.textBaseline = "middle";
            context.fillText(message, 64, 64);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(0.2, 0.2, 0.2);
            return sprite;
        }

        function buildCoordinateSystem() {
            coordSystem = new THREE.Group();
            
            // X-Achse (Rot)
            const xAxisMat = new THREE.LineBasicMaterial({ color: 0xff4444, linewidth: 3 });
            const xAxisGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-GRID_SIZE, 0, 0), new THREE.Vector3(GRID_SIZE, 0, 0)
            ]);
            coordSystem.add(new THREE.Line(xAxisGeo, xAxisMat));
            coordSystem.add(makeTextSprite("X", "#ff4444")).position.set(GRID_SIZE + 0.3, 0, 0);

            // Y-Achse (Grün)
            const yAxisMat = new THREE.LineBasicMaterial({ color: 0x44ff44, linewidth: 3 });
            const yAxisGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, -GRID_SIZE, 0), new THREE.Vector3(0, GRID_SIZE, 0)
            ]);
            coordSystem.add(new THREE.Line(yAxisGeo, yAxisMat));
            coordSystem.add(makeTextSprite("Y", "#44ff44")).position.set(0, GRID_SIZE + 0.3, 0);

            // Z-Achse (Blau)
            const zAxisMat = new THREE.LineBasicMaterial({ color: 0x4444ff, linewidth: 3 });
            const zAxisGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, -GRID_SIZE), new THREE.Vector3(0, 0, GRID_SIZE)
            ]);
            coordSystem.add(new THREE.Line(zAxisGeo, zAxisMat));
            coordSystem.add(makeTextSprite("Z", "#4444ff")).position.set(0, 0, GRID_SIZE + 0.3);

            const tickMat = new THREE.LineBasicMaterial({ color: 0xffffff });
            const tickSize = 0.1;

            for (let i = -GRID_SIZE; i <= GRID_SIZE; i++) {
                if (i === 0) continue; 

                // X-Ticks
                const xTickGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(i, -tickSize, 0), new THREE.Vector3(i, tickSize, 0)
                ]);
                coordSystem.add(new THREE.Line(xTickGeo, tickMat));
                if(i % 2 === 0) {
                    const l = makeTextSprite(i.toString(), "#ffffff");
                    l.position.set(i, -0.3, 0);
                    coordSystem.add(l);
                }

                // Y-Ticks
                const yTickGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-tickSize, i, 0), new THREE.Vector3(tickSize, i, 0)
                ]);
                coordSystem.add(new THREE.Line(yTickGeo, tickMat));
                if(i % 2 === 0) {
                    const l = makeTextSprite(i.toString(), "#ffffff");
                    l.position.set(-0.3, i, 0);
                    coordSystem.add(l);
                }

                // Z-Ticks
                const zTickGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, -tickSize, i), new THREE.Vector3(0, tickSize, i)
                ]);
                coordSystem.add(new THREE.Line(zTickGeo, tickMat));
                if(i % 2 === 0) {
                    const l = makeTextSprite(i.toString(), "#ffffff");
                    l.position.set(0, -0.3, i);
                    coordSystem.add(l);
                }
            }

            coordSystem.scale.set(UNIT_SCALE, UNIT_SCALE, UNIT_SCALE);
            scene.add(coordSystem);
            coordSystem.visible = false; 
        }

        function setupInteractionObjects() {
            // Cursor (virtuelle Stiftspitze)
            const cursorGeo = new THREE.SphereGeometry(0.015, 16, 16);
            const cursorMat = new THREE.MeshBasicMaterial({ color: 0xffff00, depthTest: false });
            cursorWorld = new THREE.Mesh(cursorGeo, cursorMat);
            cursorWorld.renderOrder = 999;
            scene.add(cursorWorld);
            cursorWorld.visible = false;

            // Startpunkt Ziel (blaue Kugel)
            const targetPointGeo = new THREE.SphereGeometry(0.03, 16, 16);
            const targetPointMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: false });
            targetPointMesh = new THREE.Mesh(targetPointGeo, targetPointMat);
            scene.add(targetPointMesh);
            targetPointMesh.visible = false;

            // Materialien für Vektoren
            const drawingMat = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 5 });
            const correctMat = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 5 });
            
            dynamicLine = new THREE.Line(new THREE.BufferGeometry(), drawingMat);
            dynamicArrow = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.1, 8), new THREE.MeshBasicMaterial({color: 0xffff00}));
            scene.add(dynamicLine);
            scene.add(dynamicArrow);
            dynamicLine.visible = false;
            dynamicArrow.visible = false;

            correctLine = new THREE.Line(new THREE.BufferGeometry(), correctMat);
            correctArrow = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.1, 8), new THREE.MeshBasicMaterial({color: 0x00ff00}));
            scene.add(correctLine);
            scene.add(correctArrow);
            correctLine.visible = false;
            correctArrow.visible = false;
        }

        function generateTask() {
            function rand() { return Math.floor(Math.random() * 7) - 3; }
            
            targetP.set(rand(), rand(), rand());
            
            do {
                targetV.set(rand(), rand(), rand());
            } while (targetV.lengthSq() === 0 || 
                     Math.abs(targetP.x + targetV.x) > GRID_SIZE ||
                     Math.abs(targetP.y + targetV.y) > GRID_SIZE ||
                     Math.abs(targetP.z + targetV.z) > GRID_SIZE);

            // Setze die blaue Kugel (Startpunkt) an die richtige Welt-Position
            const worldTargetP = targetP.clone().multiplyScalar(UNIT_SCALE).applyMatrix4(coordSystem.matrixWorld);
            targetPointMesh.position.copy(worldTargetP);
            targetPointMesh.visible = true;

            taskTitle.textContent = "Aktuelle Aufgabe";
            taskDisplay.innerHTML = `P(${targetP.x} | ${targetP.y} | ${targetP.z}) &nbsp;&nbsp;&nbsp; v = <br>(${targetV.x} | ${targetV.y} | ${targetV.z})<sup>T</sup>`;
            
            resetDrawing();
        }

        function resetDrawing() {
            state = 'FIND_START';
            btnAction.textContent = "Startpunkt setzen";
            btnAction.className = "";
            btnAction.disabled = true;
            statusHint.textContent = "Bewege das Handy zur blauen Kugel (Startpunkt P).";
            
            dynamicLine.visible = false;
            dynamicArrow.visible = false;
            correctLine.visible = false;
            correctArrow.visible = false;
        }

        function handleActionClick() {
            if (state === 'PLACE_SYSTEM') {
                coordSystemPlaced = true;
                cursorWorld.visible = true; // Cursor einblenden
                generateTask(); // Erstes Level generieren

            } else if (state === 'FIND_START') {
                if (!isSnapped) return;
                
                userStart.copy(snappedLocalPos);
                state = 'DRAWING';
                btnAction.textContent = "Vektor abschließen";
                btnAction.disabled = true;
                statusHint.textContent = "Bewege dich nun zum Zielpunkt des Vektors.";
                
                dynamicLine.visible = true;
                dynamicArrow.visible = true;

            } else if (state === 'DRAWING') {
                if (!isSnapped) return;

                userEnd.copy(snappedLocalPos);
                evaluateResult();

            } else if (state === 'EVALUATION') {
                generateTask();
            }
        }

        function evaluateResult() {
            state = 'EVALUATION';
            
            const userVector = new THREE.Vector3().subVectors(userEnd, userStart);
            
            const isStartCorrect = userStart.equals(targetP);
            const isVectorCorrect = userVector.equals(targetV);

            if (isStartCorrect && isVectorCorrect) {
                statusHint.textContent = "Ausgezeichnet! Vektor korrekt eingezeichnet.";
                btnAction.textContent = "Nächste Aufgabe";
                btnAction.className = "btn-green";
                
                dynamicLine.material.color.setHex(0x00ff00);
                dynamicArrow.material.color.setHex(0x00ff00);
            } else {
                let errorMsg = "Leider falsch. ";
                if (!isStartCorrect) errorMsg += `Falscher Startpunkt (Du hast ${userStart.x},${userStart.y},${userStart.z} gewählt). `;
                if (!isVectorCorrect) errorMsg += `Falsche Richtung/Länge.`;
                
                statusHint.textContent = errorMsg;
                btnAction.textContent = "Neue Aufgabe";
                btnAction.className = "btn-red";

                dynamicLine.material.color.setHex(0xff0000);
                dynamicArrow.material.color.setHex(0xff0000);

                drawVector(targetP, new THREE.Vector3().addVectors(targetP, targetV), correctLine, correctArrow);
                correctLine.visible = true;
                correctArrow.visible = true;
            }
            btnAction.disabled = false;
        }

        function drawVector(startLocal, endLocal, lineObj, arrowObj) {
            const startWorld = startLocal.clone().multiplyScalar(UNIT_SCALE).applyMatrix4(coordSystem.matrixWorld);
            const endWorld = endLocal.clone().multiplyScalar(UNIT_SCALE).applyMatrix4(coordSystem.matrixWorld);

            lineObj.geometry.setFromPoints([startWorld, endWorld]);
            
            const direction = new THREE.Vector3().subVectors(endWorld, startWorld);
            const length = direction.length();
            
            if (length > 0) {
                direction.normalize();
                arrowObj.position.copy(endWorld);
                const axis = new THREE.Vector3(0, 1, 0);
                arrowObj.quaternion.setFromUnitVectors(axis, direction);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            if (renderer.xr.isPresenting) {
                
                // 1. Koordinatensystem schwebt vor dem Nutzer, bis es platziert wird
                if (!coordSystemPlaced) {
                    const dir = new THREE.Vector3();
                    camera.getWorldDirection(dir);
                    dir.y = 0; 
                    dir.normalize();
                    
                    const pos = camera.position.clone().add(dir.multiplyScalar(1.2));
                    pos.y -= 0.4;
                    
                    coordSystem.position.copy(pos);
                    coordSystem.lookAt(coordSystem.position.clone().add(new THREE.Vector3(0,0,1))); 
                    coordSystem.updateMatrixWorld(true);
                } else {
                    // 2. Kamera/Handy Position ermitteln für die Interaktion
                    const camDir = new THREE.Vector3();
                    camera.getWorldDirection(camDir);
                    const rawCursorPos = camera.position.clone().add(camDir.multiplyScalar(0.2));

                    // 3. Snapping-Logik (Einrasten)
                    if (coordSystem.visible) {
                        const localPos = coordSystem.worldToLocal(rawCursorPos.clone()).divideScalar(UNIT_SCALE);
                        
                        const roundedPos = new THREE.Vector3(
                            Math.round(localPos.x),
                            Math.round(localPos.y),
                            Math.round(localPos.z)
                        );

                        if (localPos.distanceTo(roundedPos) < 0.4) {
                            isSnapped = true;
                            snappedLocalPos.copy(roundedPos);
                            const snappedWorld = roundedPos.clone().multiplyScalar(UNIT_SCALE).applyMatrix4(coordSystem.matrixWorld);
                            cursorWorld.position.copy(snappedWorld);
                            cursorWorld.material.color.setHex(0x00ff00); 
                            cursorWorld.scale.set(1.5, 1.5, 1.5);
                            
                            if (state !== 'EVALUATION') btnAction.disabled = false;
                        } else {
                            isSnapped = false;
                            cursorWorld.position.copy(rawCursorPos);
                            cursorWorld.material.color.setHex(0xffff00); 
                            cursorWorld.scale.set(1, 1, 1);
                            
                            if (state !== 'EVALUATION') btnAction.disabled = true;
                        }

                        // 4. Dynamisches Zeichnen
                        if (state === 'DRAWING') {
                            drawVector(userStart, isSnapped ? snappedLocalPos : localPos, dynamicLine, dynamicArrow);
                        }
                    }
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
